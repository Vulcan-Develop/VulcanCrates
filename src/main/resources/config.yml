config-version: 2 # Do not touch this

# ================================
#        Crates Configuration
# ================================

# Command settings
commands:
  aliases:
    - "crate"

# Key settings
keys:
  mode: "VIRTUAL" # VIRTUAL, PHYSICAL, or BOTH
  default-give-mode: "VIRTUAL" # Used by /crate give and /crate giveall
  consume-priority: "PHYSICAL" # Used when mode is BOTH

# Crate block settings
crate-block:
  auto-restore-on-startup: true
  auto-place-on-set: true
  replaceable-blocks:
    - "AIR"
    - "GRASS"
    - "TALL_GRASS"
    - "WATER"
    - "LAVA"

holograms:
  display-range: 16
  update-range: 16
  update-interval: 20

# Messages
messages:
  prefix: "&6[Crates]"
  gave-keys: "%prefix% &7You gave %player% &6%givenAmount% &7%crateType% %keyType% key(s)!"
  received-keys: "%prefix% &7You received &6%givenAmount% &7%crateType% %keyType% key(s)!"
  crate-rolled-reward-announce: "%prefix% &r%player% &7just rolled a &6%prizeName% &7from a %crateType%&7!"
  crate-rolled-reward: "%prefix% &7You won &6%prizeName%&7!"
  crate-block-placed: "%prefix% &7%crateType% crate successfully placed at your location."
  crate-removed: "%prefix% &7%crateType% crate location removed and chest destroyed."
  no-keys: "%prefix% &7You need a %crateType% %keyType% key to open this crate."
  physical-keys-dropped: "%prefix% &7Your inventory was full, so &6%amount% &7%crateType% physical key(s) were dropped at your feet."
  admin-test-prize: "&a[ADMIN TEST] &7You received the prize: &6%prizeName%"
